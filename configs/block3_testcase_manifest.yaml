      rationale: |
        N=2 evidence shows frozen-controller FAIL on smaller hydronic
        testcases. A larger commercial testcase is expected to have similar
        or worse controller transferability because slower building dynamics
        expose more of the controller's misalignment to non-bestest_air
        actuator and envelope regimes.
    mode_full_surrogate_RMSE_improvement_pct:
      expected_range: [50, 90]
      apriori_probability_for_range: 0.70
      rationale: |
        Both prior hydronic testcases produced at least 60% RMSE_T
        improvement under full recalibration. A commercial-scale testcase may
        stress Stage A/B/C beyond the prior operating points, but the inverse
        calibration framework should still recover meaningful fidelity gains.
    c_zon_ratio_vs_bestest_air:
      hypothesis_a_hydronic_family_uniform:
        expected_range: [1.7, 2.2]
        apriori_probability: 0.35
        rationale: |
