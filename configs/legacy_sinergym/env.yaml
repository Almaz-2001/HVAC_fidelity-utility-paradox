run_name: "legacy_sinergym"
output_dir: "/app/outputs/legacy_sinergym"
morl_csv_name: "morl_log.csv"

backend: sinergym
env_id: "Eplus-5Zone-hot-continuous-v1"

normalize_action: true
action_parameterization: "midpoint_gap"
rate_limit: true
max_delta: 0.15
deadband: 0.5

morl:
  temp_index: 12
  energy_index: 16
  temp_name: "Zone Air Temperature(SPACE1-1)"
  energy_name: "Facility Total HVAC Electricity Demand Rate(Whole Building)"
  temp_low: 20.0
  temp_high: 26.0
  target_temp: 22.0
  energy_scale: 1.2e-4
  w_comfort: 0.9
  w_energy: 0.1
  reward_shape: "gaussian"
  comfort_bonus: 0.02
  inband_temp_penalty_scale: 0.25
  exp_alpha: 2.5
  exp_scale: 0.04
  gaussian_sigma: 1.0
  gaussian_peak: 1.0
  gaussian_offset: 0.2
  cubic_scale: 0.60
  recovery_energy_mult: 0.60
  peak_power_threshold: 700.0
  peak_power_scale: 8e-5
  action_penalty_scale: 0.03
