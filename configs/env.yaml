run_name: ""
output_dir: "/app/outputs"
morl_csv_name: "morl_log.csv"
backend: boptest
control_mode: tsup_direct


surrogate_path: /app/outputs/surrogate_v2/rc_node_v3_tsupply.pt
boptest_timeout: 300
boptest_retries: 5
boptest_backoff: 2.0

boptest_start_time: 7776000.0
boptest_warmup_sec: 2.0

boptest_url: "http://web:8000"
boptest_testcase_key: "users/abccrusaderxyz/testcases/testcase1/testcase1.fmu"
testcase_id: "bestest_air"
step_sec: 3600
t_supply_low: 18.0
t_supply_high: 35.0
cooling_setpoint_c: 40.0
heating_setpoint_c: 15.0

action_wrappers:
  normalize_action: true
  smoothing:
    enabled: true
    deadband: 1.0
    rate_limit: true
    max_delta: 0.15

