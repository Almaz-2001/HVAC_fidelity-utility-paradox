run_name: ""
output_dir: "/app/outputs"
morl_csv_name: "morl_log.csv"
#backend: boptest

backend: surrogate
surrogate_path: /app/outputs/surrogate/rc_node_best.pt
boptest_timeout: 300
boptest_retries: 5
boptest_backoff: 2.0

boptest_warmup_sec: 2.0

boptest_url: "http://web:8000"
boptest_testcase_key: "users/abccrusaderxyz/testcases/testcase1/testcase1.fmu"
testcase_id: "bestest_air"
step_sec: 3600

action_wrappers:
  normalize_action: true
  smoothing:
    enabled: true
    deadband: 1.0
    rate_limit: true
    max_delta: 0.15

morl:
  temp_index: 0
  energy_index: 2
  temp_low: 21.0
  temp_high: 25.0
  energy_scale: 2e-4
  w_comfort: 0.8
  w_energy: 0.2


