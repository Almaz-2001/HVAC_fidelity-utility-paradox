artifact_root: outputs/morl_surrogate_ppo

subdirs:
  pretrain: pretrain
  eram_pretrain: eram_pretrain
  finetune: finetune_boptest
  yearly_eval: yearly_eval

defaults:
  seed: 42
  pretrain_steps: 2000000
  eram_iterations: 20
  eram_chunk_steps: 100000
  eram_tau_w: 0.35
  eram_adv_lr: 1.0
  eram_init_weights: "0.34,0.33,0.33"
  finetune_steps: 100000
  finetune_learning_rate: 0.0001
  finetune_jitter_days: 3.0
  eval_step_sec: 900
  eval_scenario_days: 14
